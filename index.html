<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-DEEP XP | Level Up Your Life</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Chart.js Link (Zaroori hai Analytics ke liye) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dark-theme">
    <!-- Particle Background -->
    <canvas id="particle-canvas"></canvas>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar glass-v2">
            <div class="logo-area">
                <img src="image/logo.png" class="sidebar-logo" alt="K-DEEP XP">
            </div>

            <ul class="nav-links">
                <li class="nav-item active" data-view="dashboard">
                    <i class="fas fa-th-large"></i> <span>Dashboard</span>
                </li>
                <li class="nav-item" data-view="habits">
                    <i class="fas fa-check-circle"></i> <span>Habits</span>
                </li>
                <li class="nav-item" data-view="study">
                    <i class="fas fa-book-open"></i> <span>Study Zone</span>
                </li>
                <li class="nav-item" data-view="journal">
                    <i class="fas fa-pen-fancy"></i> <span>Journal</span>
                </li>
                <li class="nav-item" data-view="analytics">
                    <i class="fas fa-chart-line"></i> <span>Analytics</span>
                </li>
                <li class="nav-item" data-view="settings">
                    <i class="fas fa-cog"></i> <span>Settings</span>
                </li>
            </ul>

            <div class="sidebar-footer">
                <span class="version-tag">FOCUS.DISCIPLINE.CONSISTENCY</span>
            </div>
        </nav>

        <!-- Mobile Header (Logo Left Corner) -->
        <header class="mobile-header glass-v2">
            <img src="image/logo.png" class="mobile-logo" alt="K-DEEP XP">
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Global Top Bar -->
            <header class="top-bar glass-v2">
                <div class="stat-badge level-container">
                    <span class="label">LEVEL</span>
                    <span class="value" id="current-level">1</span>
                </div>

                <div class="xp-container">
                    <div class="xp-info">
                        <span id="rank-name">NOVICE</span>
                        <span id="xp-ratio">0 / 1000</span>
                    </div>
                    <div class="xp-bar-bg">
                        <div class="xp-bar-fill" id="xp-fill"></div>
                    </div>
                </div>

                <div class="streak-badge">
                    <i class="fas fa-fire"></i>
                    <span id="global-streak">0</span>
                </div>
            </header>

            <!-- View Container -->
            <div id="view-container"></div>
        </main>
    </div>

    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/gamification.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/habits.js"></script>
    <script src="js/study.js"></script>
    <script src="js/journal.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
